<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
</head>
<body>
    <from>
        <h1 align="center">COURSE REGISTRATION FROM</h1>
        <fieldset>
            <legend><h2>course</h2></legend>
        <table cellpadding="10">
            <tr>
                <td><label>First name</label></td>
                <td><input type="text" name="fname" placeholder="aravind"></td>
            </tr><br>
            <tr>
                <td>Surname</td>
                <td><input type="text" name="surname" placeholder="hari"></td>
            </tr>
            <tr>
                <td>Mobile number</td>
                <td><input type="tel" name="number" placeholder="1234567890"></td>
            </tr>
            <tr>
                <td>Password</td>
                <td><input type="password" name="pass"></td>
            </tr>
            <tr>
                <td>Confirm Password</td>
                <td><input type="password" name="password"></td>
            </tr>
            <tr>
                <td>Date of Birth</td>
                <td><input type="date" name="date" ></td>
            </tr>
            <tr>
                <td>age</td>
                <td><input type="age" name="age"></td>
            </tr>
            <tr>
                <td>Gender</td>
                <td>
                    <input type="radio" name="gender" value="male">male
                    <input type="radio" name="gender" value="female">femal
                    <input type="radio" name="gender" value="others">others
                </td>
            </tr>
            <tr>
                <td>Select country</td>
                <td><select>
                    <option value="india">india</option>
                    <option value="usa">usa</option>
                </select></td>
            </tr>
            <tr>
                <td>Upload picture</td>
                <td><input type="file"></td>
            </tr>
            <tr>
                <td>
                    <input type="reset">
                </td>
            </tr>
        </table>
        </fieldset>
        <fieldset>
            <legend><h4>Course Deatails</h4></legend>
        <table cellpadding="10">
            <tr>
                <td>Select Course</td>
                <td><select>
                    <option value="java">java</option>
                    <option value="html">html</option>
                    <option value="python">python</option>
                </select></td>
            </tr>
            <tr>
                <td>Delivery Mode</td>
                <td>
                    <input type="radio">online
                    <input type="radio">offline
                </td>
            </tr>
            <tr>
                <td>Institute Name</td>
                <td><input type="txt" placeholder="THOPSTECH"></td>
            </tr>
            <tr>
                <td>Comments</td>
                <td><textarea  rows="10" cols="40" ></textarea></td>
            </tr>
            <tr>
                <td><button>Submit</button></td>
            </tr> 
        </table>
        </fieldset>
    </from>
</body>
</html>
